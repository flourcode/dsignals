<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#46446E">
  <title>Mo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%237CB583'/%3E%3Ccircle cx='14' cy='16' r='2.4' fill='%232D5033'/%3E%3Ccircle cx='26' cy='16' r='2.4' fill='%232D5033'/%3E%3Cpath d='M12 24 Q20 31 28 24' stroke='%232D5033' stroke-width='2.8' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Mo's three faces — used as <use href="#icon-face-open"> etc. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="icon-face-open" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="#7CB583"/>
    <circle cx="14" cy="16" r="2.4" fill="#2D5033"/>
    <circle cx="26" cy="16" r="2.4" fill="#2D5033"/>
    <path d="M12 24 Q20 31 28 24" fill="none" stroke="#2D5033" stroke-width="2.8" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-face-watch" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="#7CB583"/>
    <circle cx="14" cy="16" r="2.4" fill="#2D5033"/>
    <circle cx="26" cy="16" r="2.4" fill="#2D5033"/>
    <line x1="13" y1="26" x2="27" y2="26" stroke="#2D5033" stroke-width="2.8" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-face-locked" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="#7CB583"/>
    <circle cx="14" cy="16" r="2.4" fill="#2D5033"/>
    <circle cx="26" cy="16" r="2.4" fill="#2D5033"/>
    <path d="M12 28 Q20 22 28 28" fill="none" stroke="#2D5033" stroke-width="2.8" stroke-linecap="round"/>
  </symbol>
</svg>

<header class="mo-header">
  <div class="mo-header-inner">
    <div class="mo-header-spacer"></div>
    <button class="mo-header-action" id="btn-reset" aria-label="New conversation" title="New conversation">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
    <button class="mo-header-action" id="btn-about" aria-label="About" title="About">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<main id="mo-main">
  <div class="mo-thread" id="mo-thread">
    <!-- Greeting + content gets injected here -->
  </div>
</main>

<!-- Sticky composer -->
<form class="mo-composer" id="mo-composer">
  <div class="mo-composer-inner">
    <input
      type="text"
      class="mo-input"
      id="mo-input"
      placeholder="Ask Mo about the weather..."
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
    />
    <button type="submit" class="mo-send" id="mo-send" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</form>

<!-- About modal -->
<div class="mo-modal" id="mo-modal" hidden>
  <div class="mo-modal-backdrop" id="mo-modal-backdrop"></div>
  <div class="mo-modal-card" id="mo-modal-card">
    <button class="mo-modal-close" id="mo-modal-close" aria-label="Close">×</button>
    <div class="mo-modal-content" id="mo-modal-content">
      <!-- Filled in from JS -->
    </div>
  </div>
</div>

<!-- Config + scripts. Order matters — config.js must load first. -->
<script src="config.js"></script>
<script src="card-renderer.js"></script>
<script src="chips.js"></script>
<script src="stream-client.js"></script>
<script src="app.js"></script>

</body>
</html>
