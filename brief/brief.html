<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dsignals · Weekly Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 16px 80px;
      background: var(--bg-screen);
      color: var(--text-body);
      font-family: var(--font);
      line-height: 1.5;
    }

    .brief-header {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .brief-header h1 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 4px;
      color: var(--text-title);
      letter-spacing: -0.02em;
    }
    .brief-header .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .stage-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .stage-controls input[type="date"] {
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      background: white;
      color: var(--text-title);
    }
    .stage-controls label {
      font-size: 13px;
      color: var(--text-muted);
    }
    .stage-controls input[type="number"] {
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      background: white;
      color: var(--text-title);
      width: 70px;
    }

    .btn-primary {
      padding: 10px 20px;
      background: var(--primary-100);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover { background: var(--primary-80); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      padding: 8px 16px;
      background: var(--bg-tint);
      color: var(--text-title);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-secondary:hover { background: var(--primary-20); }

    .stage-status {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .bucket-counts {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
      font-size: 12px;
      color: var(--text-muted);
    }
    .bucket-counts span {
      padding: 4px 10px;
      background: var(--bg-tint);
      border-radius: var(--radius-pill);
    }

    /* Candidate cards */
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }
    .candidate {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 120ms ease;
      position: relative;
    }
    .candidate:hover { border-color: var(--primary-60); }
    .candidate.picked {
      border-color: var(--primary-100);
      background: var(--primary-20);
    }
    .candidate-pick-num {
      position: absolute;
      top: 12px;
      right: 14px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      background: var(--primary-100);
      color: white;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .candidate:not(.picked) .candidate-pick-num { display: none; }
    .candidate-bucket {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 4px;
    }
    .candidate-strength {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .strength-strong { background: #E5F4E5; color: #2D5033; }
    .strength-medium { background: #FFF4E0; color: #8B6500; }
    .strength-weak   { background: #F0F0F5; color: #6C6880; }
    .candidate-headline {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-title);
      margin-bottom: 8px;
      padding-right: 32px;
    }
    .candidate-samples {
      font-size: 11px;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, monospace;
      line-height: 1.4;
    }

    .draft-controls {
      margin: 24px 0 16px;
      padding: 16px;
      background: var(--bg-tint);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .draft-controls .pick-count {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-title);
      flex: 1;
      min-width: 200px;
    }

    /* Grouping row — appears between picker and draft controls when 2+ picks of same bucket exist */
    #grouping-area {
      margin: 16px 0 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #grouping-area:empty { display: none; }
    .grouping-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 12px;
      background: var(--bg-tint);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-title);
    }

    /* Output area */
    .output-area {
      margin-top: 24px;
    }
    .output-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .output-pre {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      color: var(--text-body);
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
      max-height: 70vh;
      overflow-y: auto;
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
      font-style: italic;
    }

    .stage-divider {
      margin: 32px 0 16px;
      padding-top: 24px;
      border-top: 1px solid var(--border-soft);
    }
    .stage-divider h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 4px;
      color: var(--text-title);
    }
    .stage-divider p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
    }
  </style>
</head>
<body>

<div class="brief-header">
  <h1>dsignals · Weekly Brief</h1>
  <div class="subtitle">Find candidate signals for this week's Substack issue. Pick three. Get a draft.</div>
</div>

<!-- Stage 1: gather candidates -->
<div class="stage-1">
  <div class="stage-controls">
    <label>Issue #
      <input type="number" id="issue-num" value="1" min="1" max="999">
    </label>
    <label>Since
      <input type="date" id="since-date">
    </label>
    <button class="btn-primary" id="find-candidates">Find this week's signals</button>
  </div>
  <div class="stage-status" id="stage-1-status"></div>
  <div class="bucket-counts" id="bucket-counts" hidden></div>
</div>

<!-- Stage 1.5: candidate picker -->
<div class="stage-divider" id="picker-divider" hidden>
  <h2>Candidates</h2>
  <p>Click 2-6 to pick. Pick from the same bucket and you can group them as one signal.</p>
</div>
<div class="candidates" id="candidates"></div>
<div id="grouping-area"></div>

<!-- Stage 2: draft generation -->
<div class="draft-controls" id="draft-controls" hidden>
  <span class="pick-count" id="pick-count">Pick 3 signals</span>
  <button class="btn-primary" id="generate-draft" disabled>Draft these signals</button>
</div>

<!-- Stage 3: output -->
<div class="stage-divider" id="output-divider" hidden>
  <h2>Draft</h2>
  <p>Edit in place, then copy to Substack.</p>
</div>
<div class="output-area" id="output-area" hidden>
  <div class="output-toolbar">
    <button class="btn-secondary" id="copy-md">Copy markdown</button>
    <button class="btn-secondary" id="reroll">Re-roll</button>
  </div>
  <pre class="output-pre" id="output-pre" contenteditable="true"></pre>
</div>

<script src="../config.js"></script>
<script>
'use strict';

const apiEndpoint = window.MO_CONFIG?.apiEndpoint;
if (!apiEndpoint) {
  document.body.innerHTML += '<div style="color: red; padding: 16px;">No apiEndpoint in config.js</div>';
}

// Default since date = last Sunday (so brief covers Sun-Sun)
const today = new Date();
const dayOfWeek = today.getDay();
const lastSunday = new Date(today);
lastSunday.setDate(today.getDate() - (dayOfWeek === 0 ? 7 : dayOfWeek));
document.getElementById('since-date').value = lastSunday.toISOString().slice(0, 10);

let candidatesData = [];
let pickedOrder = [];   // Array of candidate indexes in pick order
let groups = [];        // Array of arrays — each inner array is candidate indexes that should be ONE composite signal
let dateRange = null;

const MIN_PICKS = 2;
const MAX_PICKS = 6;

// ── Stage 1: Find candidates ─────────────────────────────────────
document.getElementById('find-candidates').addEventListener('click', async () => {
  const btn = document.getElementById('find-candidates');
  const status = document.getElementById('stage-1-status');
  const sinceDate = document.getElementById('since-date').value;

  btn.disabled = true;
  status.textContent = 'Scanning EDGAR (this takes ~10-20 seconds)...';

  // Reset stage 2/3
  document.getElementById('candidates').innerHTML = '';
  document.getElementById('draft-controls').hidden = true;
  document.getElementById('output-area').hidden = true;
  document.getElementById('output-divider').hidden = true;
  pickedOrder = [];
  groups = [];

  try {
    const t0 = Date.now();
    const res = await fetch(apiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_type: 'brief_candidates', date_after: sinceDate }),
    });

    if (!res.ok) throw new Error(`Lambda ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    candidatesData = data.candidates || [];
    dateRange = data.date_range;
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    status.textContent = `Found ${candidatesData.length} candidates in ${elapsed}s. Range: ${data.date_range.since} through ${data.date_range.through}.`;

    // Show bucket counts
    const bcEl = document.getElementById('bucket-counts');
    bcEl.hidden = false;
    bcEl.innerHTML = Object.entries(data.bucket_counts || {})
      .map(([k, v]) => `<span>${escapeHtml(k.replace('_', ' '))}: ${v}</span>`)
      .join('');

    renderCandidates();

  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    status.style.color = '#7A3520';
  } finally {
    btn.disabled = false;
  }
});

// ── Stage 1.5: Render candidates as picker cards ─────────────────
function renderCandidates() {
  document.getElementById('picker-divider').hidden = false;
  const container = document.getElementById('candidates');
  container.innerHTML = '';

  if (candidatesData.length === 0) {
    container.innerHTML = '<div class="empty-state">No candidate signals found this week. Try a wider date range.</div>';
    return;
  }

  candidatesData.forEach((c, idx) => {
    const card = document.createElement('div');
    card.className = 'candidate';
    card.dataset.id = idx;

    const samplesHtml = (c.sample_filings || []).map(s => {
      const link = s.doc_link
        ? `<a href="${escapeHtml(s.doc_link)}" target="_blank" rel="noopener" style="color: inherit; text-decoration: underline;" onclick="event.stopPropagation()">${escapeHtml(s.filer)}</a>`
        : escapeHtml(s.filer);
      return `${link} · ${escapeHtml(s.form)} · ${escapeHtml(s.date)}${s.amount ? ' · $' + (s.amount/1_000_000).toFixed(1) + 'M' : ''}`;
    }).join('<br>');

    card.innerHTML = `
      <div class="candidate-bucket">${escapeHtml((c.bucket || '').replace('_', ' '))} <span class="candidate-strength strength-${escapeHtml(c.strength || 'medium')}">${escapeHtml(c.strength || 'medium')}</span></div>
      <div class="candidate-headline">${escapeHtml(c.headline)}</div>
      <div class="candidate-samples">${samplesHtml || ''}</div>
      <div class="candidate-pick-num"></div>
    `;
    card.addEventListener('click', () => togglePick(idx));
    container.appendChild(card);
  });

  document.getElementById('draft-controls').hidden = false;
  updatePickCount();
  renderGroupingControls();
}

function togglePick(idx) {
  const card = document.querySelector(`.candidate[data-id="${idx}"]`);
  const wasIn = pickedOrder.includes(idx);

  if (wasIn) {
    // Unpick — also remove from any group
    pickedOrder = pickedOrder.filter(i => i !== idx);
    groups = groups.map(g => g.filter(i => i !== idx)).filter(g => g.length >= 2);
  } else {
    if (pickedOrder.length >= MAX_PICKS) {
      // At max — bump the oldest pick
      const removed = pickedOrder.shift();
      groups = groups.map(g => g.filter(i => i !== removed)).filter(g => g.length >= 2);
      document.querySelector(`.candidate[data-id="${removed}"]`)?.classList.remove('picked');
    }
    pickedOrder.push(idx);
  }

  // Re-render pick state on all cards
  document.querySelectorAll('.candidate').forEach(c => {
    const cIdx = parseInt(c.dataset.id, 10);
    const pickPos = pickedOrder.indexOf(cIdx);
    if (pickPos >= 0) {
      c.classList.add('picked');
      // Show pick number AND group letter if grouped
      const groupIdx = groups.findIndex(g => g.includes(cIdx));
      const groupLabel = groupIdx >= 0 ? String.fromCharCode(65 + groupIdx) : '';
      c.querySelector('.candidate-pick-num').textContent = groupLabel ? `${pickPos + 1}${groupLabel}` : `${pickPos + 1}`;
    } else {
      c.classList.remove('picked');
      c.querySelector('.candidate-pick-num').textContent = '';
    }
  });

  updatePickCount();
  renderGroupingControls();
}

function updatePickCount() {
  const n = pickedOrder.length;
  const minRemaining = Math.max(0, MIN_PICKS - n);
  let label;
  if (n === 0) label = `Pick ${MIN_PICKS}-${MAX_PICKS} signals`;
  else if (n < MIN_PICKS) label = `${n} picked · need ${minRemaining} more`;
  else label = `${n} picked${n === MAX_PICKS ? ' (max)' : ''}`;

  document.getElementById('pick-count').textContent = label;
  document.getElementById('generate-draft').disabled = n < MIN_PICKS;
}

// ── Grouping ──────────────────────────────────────────────────────
// When 2+ candidates are picked from the same bucket, offer to group them
// into a single composite signal. Useful for clusters like "5 proxies hit
// in 48 hours" — that's ONE signal block, not 5.
function renderGroupingControls() {
  const container = document.getElementById('grouping-area');
  container.innerHTML = '';

  if (pickedOrder.length < 2) return;

  // For each bucket with 2+ picks, suggest grouping
  const bucketToPickedIdxs = {};
  pickedOrder.forEach(idx => {
    const bucket = candidatesData[idx]?.bucket || '?';
    if (!bucketToPickedIdxs[bucket]) bucketToPickedIdxs[bucket] = [];
    bucketToPickedIdxs[bucket].push(idx);
  });

  Object.entries(bucketToPickedIdxs).forEach(([bucket, idxs]) => {
    if (idxs.length < 2) return;

    const isGrouped = groups.some(g => idxs.every(i => g.includes(i)) && g.length === idxs.length);

    const row = document.createElement('div');
    row.className = 'grouping-row';
    row.innerHTML = `
      <span>${idxs.length} ${bucket.replace('_', ' ')} signals picked</span>
      <button class="btn-secondary group-toggle" data-bucket="${bucket}">${isGrouped ? 'Ungroup' : 'Group as one signal'}</button>
    `;
    container.appendChild(row);
  });

  // Wire up group toggles
  container.querySelectorAll('.group-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const bucket = btn.dataset.bucket;
      const idxs = pickedOrder.filter(i => candidatesData[i]?.bucket === bucket);

      // Remove any existing group with these candidates
      const existing = groups.findIndex(g => idxs.every(i => g.includes(i)) && g.length === idxs.length);
      if (existing >= 0) {
        groups.splice(existing, 1);
      } else {
        // Remove these candidates from any other group, then add as new group
        groups = groups.map(g => g.filter(i => !idxs.includes(i))).filter(g => g.length >= 2);
        groups.push([...idxs]);
      }

      // Re-render pick badges to show group letters
      togglePick.refresh = true;
      // Force re-render
      document.querySelectorAll('.candidate').forEach(c => {
        const cIdx = parseInt(c.dataset.id, 10);
        const pickPos = pickedOrder.indexOf(cIdx);
        if (pickPos >= 0) {
          const groupIdx = groups.findIndex(g => g.includes(cIdx));
          const groupLabel = groupIdx >= 0 ? String.fromCharCode(65 + groupIdx) : '';
          c.querySelector('.candidate-pick-num').textContent = groupLabel ? `${pickPos + 1}${groupLabel}` : `${pickPos + 1}`;
        }
      });

      renderGroupingControls();
    });
  });
}

// ── Stage 2: Generate draft ──────────────────────────────────────
document.getElementById('generate-draft').addEventListener('click', async () => {
  await generateDraft();
});

async function generateDraft() {
  const btn = document.getElementById('generate-draft');
  const issueNum = parseInt(document.getElementById('issue-num').value, 10) || 1;

  // Build the signal blocks: each block is either a single candidate OR a
  // group of candidates (from the groups array). Order: by first-pick order.
  const signalBlocks = [];
  const consumedIdxs = new Set();

  for (const idx of pickedOrder) {
    if (consumedIdxs.has(idx)) continue;
    // Is this candidate part of a group?
    const groupIdx = groups.findIndex(g => g.includes(idx));
    if (groupIdx >= 0) {
      const groupCandidates = groups[groupIdx].map(i => candidatesData[i]);
      signalBlocks.push({ kind: 'cluster', candidates: groupCandidates });
      groups[groupIdx].forEach(i => consumedIdxs.add(i));
    } else {
      signalBlocks.push({ kind: 'single', candidates: [candidatesData[idx]] });
      consumedIdxs.add(idx);
    }
  }

  btn.disabled = true;
  btn.textContent = 'Drafting...';
  document.getElementById('output-divider').hidden = false;
  document.getElementById('output-area').hidden = false;
  document.getElementById('output-pre').textContent = `Drafting ${signalBlocks.length} signal block${signalBlocks.length === 1 ? '' : 's'} (this takes 10-30 seconds)...`;

  try {
    const res = await fetch(apiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        request_type: 'brief_draft',
        issue_number: issueNum,
        signal_blocks: signalBlocks,
        date_range: dateRange,
      }),
    });

    if (!res.ok) throw new Error(`Lambda ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('output-pre').textContent = data.markdown || '(empty draft)';

  } catch (err) {
    document.getElementById('output-pre').textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Draft these signals';
  }
}

// ── Output toolbar ───────────────────────────────────────────────
document.getElementById('copy-md').addEventListener('click', async () => {
  const text = document.getElementById('output-pre').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-md');
    const old = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = old, 1500);
  } catch (err) {
    alert('Copy failed: ' + err.message);
  }
});

document.getElementById('reroll').addEventListener('click', async () => {
  if (pickedOrder.length < MIN_PICKS) return;
  await generateDraft();
});

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>

</body>
</html>
