<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mo · SEC Test Harness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Test harness chrome — kept minimal so the actual card output is what stands out */

    body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 80px;
      background: var(--bg-screen);
      color: var(--text-body);
      font-family: var(--font);
    }

    .test-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .test-header h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px;
      color: var(--text-title);
      letter-spacing: var(--track-tight);
    }

    .test-header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .test-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .test-controls button {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: var(--primary-100);
      color: var(--white);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .test-controls button:hover { background: var(--primary-80); }
    .test-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

    .test-controls button.secondary {
      background: var(--bg-tint);
      color: var(--text-title);
      border: 1px solid var(--border);
    }
    .test-controls button.secondary:hover { background: var(--primary-20); }

    .persona-section {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border-soft);
    }

    .persona-section h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-title);
      margin: 0 0 4px;
    }

    .persona-section .persona-job {
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 16px;
      font-style: italic;
    }

    .test-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .test-block-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .test-block-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .test-block-status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .test-block-status.pending { background: var(--bg-tint); color: var(--text-faint); }
    .test-block-status.running { background: #FFF4E0; color: #8B6500; }
    .test-block-status.done { background: #E5F4E5; color: #2D5033; }
    .test-block-status.failed { background: #FFE5E0; color: #7A3520; }

    .test-query {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-title);
      margin-bottom: 4px;
    }

    .test-criteria {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-style: italic;
    }

    .test-result {
      margin-top: 12px;
    }

    .test-pass-1 {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-tint);
      font-size: 13px;
      color: var(--text-body);
      line-height: 1.5;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .test-pass-1::before {
      content: "Pass 1 (setup)";
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .test-card-slot {
      margin-bottom: 12px;
    }
    .test-card-slot:empty { display: none; }

    .test-pass-2 {
      padding: 10px 12px;
      border-left: 2px solid var(--primary-60);
      font-size: 13px;
      color: var(--text-body);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .test-pass-2::before {
      content: "Pass 2 (interpretation)";
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .test-error {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: #FFE5E0;
      color: #7A3520;
      font-size: 13px;
    }

    .test-no-card {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-faint);
      font-style: italic;
    }

    .test-block-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
      font-size: 11px;
      color: var(--text-faint);
    }

    .test-block-footer button {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: var(--font);
    }

    .test-block-footer button:hover {
      background: var(--bg-tint);
      color: var(--text-title);
    }

    .test-debug {
      margin-top: 8px;
      padding: 8px;
      background: #F0F0F5;
      border-radius: var(--radius-sm);
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      color: #555;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    .test-debug:empty { display: none; }

    .summary-bar {
      position: sticky;
      top: 0;
      background: var(--bg-screen);
      padding: 12px 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .summary-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .summary-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .summary-stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-title);
      font-variant-numeric: tabular-nums;
    }
    .summary-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<!-- Mo's SVG faces (needed by stream-client for status indicators) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="icon-face-open" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="#7CB583"/>
    <circle cx="14" cy="16" r="2.4" fill="#2D5033"/>
    <circle cx="26" cy="16" r="2.4" fill="#2D5033"/>
    <path d="M12 24 Q20 31 28 24" fill="none" stroke="#2D5033" stroke-width="2.8" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-face-watch" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="#7CB583"/>
    <circle cx="14" cy="16" r="2.4" fill="#2D5033"/>
    <circle cx="26" cy="16" r="2.4" fill="#2D5033"/>
    <line x1="13" y1="26" x2="27" y2="26" stroke="#2D5033" stroke-width="2.8" stroke-linecap="round"/>
  </symbol>
</svg>

<div class="test-header">
  <h1>Mo · SEC Test Harness</h1>
  <div class="subtitle">15 queries across 5 personas. Hits the live Lambda. Run sequentially.</div>
  <div class="test-controls">
    <button id="run-all">Run All 15</button>
    <button id="stop-all" class="secondary" disabled>Stop</button>
    <button id="reset-all" class="secondary">Reset</button>
  </div>
</div>

<div class="summary-bar" id="summary-bar" hidden>
  <div class="summary-stats">
    <div class="summary-stat">
      <div class="summary-stat-value" id="stat-completed">0</div>
      <div class="summary-stat-label">Completed</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value" id="stat-running">0</div>
      <div class="summary-stat-label">Running</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value" id="stat-errored">0</div>
      <div class="summary-stat-label">Errored</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value" id="stat-elapsed">0s</div>
      <div class="summary-stat-label">Elapsed</div>
    </div>
  </div>
</div>

<main id="test-results">
  <!-- Filled by JS -->
</main>

<script src="config.js"></script>
<script src="card-renderer.js"></script>
<script src="test-runner.js"></script>

</body>
</html>
